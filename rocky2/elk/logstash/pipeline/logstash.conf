input {
  beats {
    port => 5044
  }
}

filter {
  if [host][name] {
    mutate {
      add_field => { "source_host" => "%{[host][name]}" }
    }
  }
}

output {
  elasticsearch {
    hosts            => ["http://elasticsearch:9200"]
    user             => "elastic"
    password         => "${ELASTIC_PASSWORD}"
    index            => "filebeat-%{+YYYY.MM.dd}"
    action           => "create"
  }
}
